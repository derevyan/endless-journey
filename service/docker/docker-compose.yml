services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg18-trixie
    container_name: journey-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-journey}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-journey_dev}
      POSTGRES_DB: ${POSTGRES_DB:-journey}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - journey-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U journey"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: journey-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - journey-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  minio:
    image: minio/minio:latest
    container_name: journey-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BROWSER: "off"
    ports:
      - "${MINIO_PORT:-9000}:9000"
    volumes:
      - minio_data:/data
    networks:
      - journey-network
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_test_data:
  redis_data:
  minio_data:

networks:
  journey-network:
    driver: bridge
